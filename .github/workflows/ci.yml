name: CI — Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run unit tests (no browser needed)
        run: pytest tests/test_epex_scraper.py -v -m "not e2e"

      # e2e tests require a live browser + saved Cloudflare session.
      # They are skipped here automatically (no session/ folder in CI).
      # Run locally with: pytest tests/test_scrape_e2e.py -v -s
